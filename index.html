<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配車作成</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="app">
    <div class="page-title">🚗 配車作成</div>
    <div class="page-sub">集合場所・時間を設定し、運転者と乗る人を登録します</div>
    
    <div class="tab-bar">
      <button class="tab active" onclick="switchTab('setup')">
        <span class="tab-icon">⚙️</span>設定
      </button>
      <button class="tab" onclick="switchTab('drivers')">
        <span class="tab-icon">🚗</span>運転者
      </button>
      <button class="tab" onclick="switchTab('riders')">
        <span class="tab-icon">👤</span>乗る人
      </button>
      <button class="tab" onclick="switchTab('result')">
        <span class="tab-icon">📋</span>配車結果
      </button>
    </div>

    <!-- 各タブのコンテンツ領域 -->
    <div id="tab-setup"></div>
    <div id="tab-drivers" style="display:none"></div>
    <div id="tab-riders" style="display:none"></div>
    <div id="tab-result" style="display:none"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
